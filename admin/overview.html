<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Navigation - Nijenhuis</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="frontend/Images/logo-white.svg">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            font-family: var(--font-family);
        }
        
        .container {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            padding: var(--spacing-3xl);
            max-width: 600px;
            width: 90%;
            text-align: center;
        }
        
        .logo {
            width: 100px;
            height: 100px;
            margin: 0 auto var(--spacing-xl);
        }
        
        h1 {
            color: var(--secondary-color);
            font-size: var(--font-size-3xl);
            margin-bottom: var(--spacing-md);
        }
        
        p {
            color: var(--text-secondary);
            margin-bottom: var(--spacing-2xl);
        }
        
        .nav-links {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-md);
        }
        
        .nav-link {
            display: block;
            padding: var(--spacing-md) var(--spacing-xl);
            background: var(--primary-color);
            color: var(--white);
            text-decoration: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            transition: var(--transition-normal);
        }
        
        .nav-link:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        .subtitle {
            color: var(--text-secondary);
            font-size: var(--font-size-sm);
            margin-top: var(--spacing-xl);
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="frontend/Images/logo-white.svg" alt="Nijenhuis" class="logo">
        <h1>Nijenhuis Admin</h1>
        <p>Kies een pagina om te beheren:</p>
        
        <div class="nav-links">
            <a href="admin/boat-management.html" class="nav-link">Boat Management</a>
            <a href="admin/booking-management.html" class="nav-link">Booking Management (Calendar)</a>
            <a href="pages/index.php" class="nav-link">Main Website</a>
        </div>
        
        <p class="subtitle">Admin systeem voor Nijenhuis Botenverhuur</p>
    </div>
</body>
</html>
