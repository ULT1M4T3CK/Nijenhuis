# Nijenhuis AWS Nginx Configuration - HTTP only (for initial deploy / no SSL yet)
# Use this when SSL certificates are not yet configured.
# After running certbot, switch to nginx-aws.conf for HTTPS.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Root directory for PHP files
    root /home/ec2-user/nijenhuis;
    index index.php index.html;

    # Allow larger uploads (images for boats/items)
    client_max_body_size 50M;

    # GZip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/html text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml;
    gzip_min_length 256;

    # Sitemap and robots.txt
    location = /sitemap.xml {
        try_files $uri =404;
    }

    location = /robots.txt {
        try_files $uri =404;
    }

    # Backend API proxy (port 8080)
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    # Chatbot API Proxy
    location ^~ /vybris/api/ {
        resolver 8.8.8.8 ipv6=off;
        proxy_pass https://ultimaitech.com/vybris/api/;
        proxy_http_version 1.1;
        proxy_set_header Host ultimaitech.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_set_header Origin "https://ultimaitech.com";
        proxy_set_header Referer "https://ultimaitech.com/";
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Accept $http_accept;
        proxy_set_header Accept-Language $http_accept_language;
    }

    # PHP handling
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php-fpm/www.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Clean URL rewrites
    location = /botenverhuur { rewrite ^ /pages/botenverhuur.php last; }
    location = /vakantiehuis { rewrite ^ /pages/vakantiehuis.php last; }
    location = /te-koop { rewrite ^ /pages/te-koop.php last; }
    location = /camping { rewrite ^ /pages/camping.php last; }
    location = /vaarkaart { rewrite ^ /pages/vaarkaart.php last; }
    location = /contact { rewrite ^ /pages/contact.php last; }
    location = /booking { rewrite ^ /pages/booking.php last; }
    location = /checkout { rewrite ^ /pages/checkout.php last; }
    location = /giethoorn { rewrite ^ /pages/giethoorn.php last; }
    location = /weerribben { rewrite ^ /pages/weerribben.php last; }
    location = /belt-schutsloot { rewrite ^ /pages/belt-schutsloot.php last; }
    location = /veelgestelde-vragen { rewrite ^ /pages/veelgestelde-vragen.php last; }
    location = /admin-login { rewrite ^ /pages/admin-login.php last; }
    location = /login { rewrite ^ /pages/employee-login.php last; }
    location = /employee-login { rewrite ^ /pages/employee-login.php last; }
    location = /employee-portal { rewrite ^ /pages/employee-portal.php last; }
    location = /payment-success { rewrite ^ /pages/payment-success.php last; }
    location = /payment-failure { rewrite ^ /pages/payment-failure.php last; }
    location = /offline { rewrite ^ /pages/offline.php last; }

    location /pages/ {
        try_files $uri $uri/ /pages/index.php?$query_string;
    }

    location = / {
        rewrite ^ /pages/index.php last;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Service Worker - no cache
    location ~* sw\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0";
    }

    # Static files caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    location ~ /\. { deny all; }
    location ~ \.env$ { deny all; }

    server_tokens off;
    access_log /var/log/nginx/nijenhuis_access.log;
    error_log /var/log/nginx/nijenhuis_error.log;
}
