# Nijenhuis AWS Nginx Configuration
# PHP website with Python backend APIs
# Canonical host: nijenhuis-botenverhuur.com (www redirects 301 to non-www)

# HTTP: redirect www to non-www HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name www.nijenhuis-botenverhuur.com;
    return 301 https://nijenhuis-botenverhuur.com$request_uri;
}

# HTTP server - redirect to HTTPS (non-www only)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name nijenhuis-botenverhuur.com;
    
    # Allow Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    
    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://nijenhuis-botenverhuur.com$request_uri;
    }
}

# HTTPS: redirect www to non-www (SEO canonical)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.nijenhuis-botenverhuur.com;
    ssl_certificate /etc/letsencrypt/live/nijenhuis-botenverhuur.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nijenhuis-botenverhuur.com-0001/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    return 301 https://nijenhuis-botenverhuur.com$request_uri;
}

# HTTPS server (canonical - non-www only)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name nijenhuis-botenverhuur.com;
    
    # SSL certificates (will be configured by certbot)
    ssl_certificate /etc/letsencrypt/live/nijenhuis-botenverhuur.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nijenhuis-botenverhuur.com-0001/privkey.pem;
    
    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # GZip Compression - Enable compression for text-based content
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml application/xhtml+xml application/x-font-ttf application/vnd.ms-fontobject font/opentype image/svg+xml image/x-icon;
    gzip_min_length 256;
    gzip_disable "msie6";
    
    # Brotli Compression - Better compression than GZip
    # Requires nginx-module-brotli; uncomment after installing:
    #   sudo dnf install nginx-module-brotli
    #   Add 'load_module modules/ngx_http_brotli_filter_module.so;' to /etc/nginx/nginx.conf
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/html text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml application/xhtml+xml application/x-font-ttf application/vnd.ms-fontobject font/opentype image/svg+xml image/x-icon;
    # brotli_min_length 1000;
    
    # Root directory for PHP files
    root /home/ec2-user/nijenhuis;
    index index.php index.html;

    # Allow larger uploads (images for boats/items)
    client_max_body_size 50M;

    # Never expose raw JSON from the document root (operational data lives in data/, served only via PHP)
    location ~* \.json$ {
        deny all;
        return 403;
    }

    # Sitemap and robots.txt - serve directly from root
    location = /sitemap.xml {
        try_files $uri =404;
    }

    location = /robots.txt {
        try_files $uri =404;
    }

    # AI crawler content: llms.txt (NL, EN, DE)
    location = /llms.txt {
        try_files $uri =404;
        add_header Content-Type "text/plain; charset=utf-8" always;
        add_header Cache-Control "public, max-age=86400" always;
    }
    location = /llms-nijenhuis.txt {
        try_files $uri =404;
        add_header Content-Type "text/plain; charset=utf-8" always;
        add_header Cache-Control "public, max-age=86400" always;
        add_header X-Robots-Tag "all" always;
    }
    location = /en/llms.txt {
        rewrite ^ /llms-en.txt last;
    }
    location = /de/llms.txt {
        rewrite ^ /llms-de.txt last;
    }
    location ~ ^/llms-(en|de)\.txt$ {
        try_files $uri =404;
        add_header Content-Type "text/plain; charset=utf-8" always;
        add_header Cache-Control "public, max-age=86400" always;
    }

    # AI crawler content: llms-full.txt (concatenated markdown, NL/EN/DE)
    location = /llms-full.txt {
        rewrite ^ /pages/llms-full.php?lang=nl last;
    }
    location = /en/llms-full.txt {
        rewrite ^ /pages/llms-full.php?lang=en last;
    }
    location = /de/llms-full.txt {
        rewrite ^ /pages/llms-full.php?lang=de last;
    }

    # humans.txt (entity trust signal)
    location = /humans.txt {
        try_files $uri =404;
        add_header Content-Type "text/plain; charset=utf-8" always;
    }

    # .well-known/security.txt (entity trust signal)
    location = /.well-known/security.txt {
        try_files $uri =404;
        add_header Content-Type "text/plain; charset=utf-8" always;
    }

    # AI crawler content: per-page markdown files (e.g. /giethoorn.md)
    location ~ ^/([a-z0-9][a-z0-9\-]*)\.md$ {
        fastcgi_pass unix:/run/php-fpm/www.sock;
        fastcgi_param SCRIPT_FILENAME $document_root/pages/serve-markdown.php;
        include fastcgi_params;
        fastcgi_param QUERY_STRING page=$1;
        add_header Cache-Control "public, max-age=86400" always;
    }

    # Block direct access to markdown source directory
    location ^~ /markdown/ {
        deny all;
        return 404;
    }

    # Blog images are referenced as /frontend/Images/blog/... (see blog-portal upload).
    # With root = project root, nginx already serves that path if files exist on disk after deploy.

    # Public blog (PHP) — matches router.php behaviour.
    # Rewrites must capture slug/lang in the rewrite regex (rewrite ^ alone has no $1/$2).
    location = /blog {
        rewrite ^ /pages/blog.php?lang=nl last;
    }
    location ~ ^/blog/([a-z0-9\-]+)$ {
        rewrite ^/blog/([a-z0-9\-]+)$ /pages/article.php?lang=nl&slug=$1 last;
    }
    location ~ ^/blog/([a-z0-9\-]+)\.md$ {
        rewrite ^/blog/([a-z0-9\-]+)\.md$ /pages/blog-article-md.php?lang=nl&slug=$1 last;
    }
    location = /en/blog {
        rewrite ^ /pages/blog.php?lang=en last;
    }
    location = /de/blog {
        rewrite ^ /pages/blog.php?lang=de last;
    }
    location ~ ^/(en|de)/blog/([a-z0-9\-]+)$ {
        rewrite ^/(en|de)/blog/([a-z0-9\-]+)$ /pages/article.php?lang=$1&slug=$2 last;
    }
    location ~ ^/(en|de)/blog/([a-z0-9\-]+)\.md$ {
        rewrite ^/(en|de)/blog/([a-z0-9\-]+)\.md$ /pages/blog-article-md.php?lang=$1&slug=$2 last;
    }

    # Blog portal (CMS)
    location = /blog-portal {
        rewrite ^ /blog-portal/login.php last;
    }
    location = /blog-portal/login {
        rewrite ^ /blog-portal/login.php last;
    }
    location = /blog-portal/dashboard {
        rewrite ^ /blog-portal/dashboard.php last;
    }
    location = /blog-portal/logout {
        rewrite ^ /blog-portal/logout.php last;
    }
    location = /blog-portal/style {
        rewrite ^ /blog-portal/style-editor.php last;
    }
    location = /blog-portal/article/new {
        rewrite ^ /blog-portal/article-edit.php?slug=new last;
    }
    location ~ ^/blog-portal/article/edit/([a-z0-9\-]+)$ {
        rewrite ^/blog-portal/article/edit/([a-z0-9\-]+)$ /blog-portal/article-edit.php?slug=$1 last;
    }

    # Backend API proxy (port 8080)
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    # Chatbot API Proxy to bypass CORS
    location ^~ /vybris/api/ {
        resolver 8.8.8.8 ipv6=off;
        proxy_pass https://ultimaitech.com/vybris/api/;
        proxy_http_version 1.1;
        proxy_set_header Host ultimaitech.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        
        # Spoof headers to look like the request is coming from ultimaitech.com
        proxy_set_header Origin "https://ultimaitech.com";
        proxy_set_header Referer "https://ultimaitech.com/";
        
        # Pass client headers to look like a real browser
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Accept $http_accept;
        proxy_set_header Accept-Language $http_accept_language;
    }

    # PHP handling
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php-fpm/www.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Clean URL rewrites - map /pagename to /pages/pagename.php
    location = /botenverhuur {
        rewrite ^ /pages/botenverhuur.php last;
    }
    location = /vakantiehuis {
        rewrite ^ /pages/vakantiehuis.php last;
    }
    location = /te-koop {
        rewrite ^ /pages/te-koop.php last;
    }
    location = /camping {
        rewrite ^ /pages/camping.php last;
    }
    location = /vaarkaart {
        rewrite ^ /pages/vaarkaart.php last;
    }
    location = /contact {
        rewrite ^ /pages/contact.php last;
    }
    location = /booking {
        rewrite ^ /pages/booking.php last;
    }
    location = /checkout {
        rewrite ^ /pages/checkout.php last;
    }
    location = /giethoorn {
        rewrite ^ /pages/giethoorn.php last;
    }
    location = /weerribben {
        rewrite ^ /pages/weerribben.php last;
    }
    location = /belt-schutsloot {
        rewrite ^ /pages/belt-schutsloot.php last;
    }
    location = /wanneperveen {
        rewrite ^ /pages/wanneperveen.php last;
    }
    location = /veelgestelde-vragen {
        rewrite ^ /pages/veelgestelde-vragen.php last;
    }
    location = /tarieven {
        rewrite ^ /pages/tarieven.php last;
    }
    location = /admin-login {
        rewrite ^ /pages/admin-login.php last;
    }
    location = /login {
        rewrite ^ /pages/employee-login.php last;
    }
    location = /employee-login {
        rewrite ^ /pages/employee-login.php last;
    }
    location = /employee-portal {
        rewrite ^ /pages/employee-portal.php last;
    }
    location = /payment-success {
        rewrite ^ /pages/payment-success.php last;
    }
    location = /payment-failure {
        rewrite ^ /pages/payment-failure.php last;
    }
    location = /offline {
        rewrite ^ /pages/offline.php last;
    }

    # Boat detail pages - single path segment (e.g. /sailboat-4-5, /electrosloop-8)
    # For SEO and web scrapers. Known exact routes above take precedence over this regex.
    location ~ ^/([a-z0-9][a-z0-9\-]*)$ {
        fastcgi_pass unix:/run/php-fpm/www.sock;
        fastcgi_param SCRIPT_FILENAME $document_root/pages/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
    }

    # Rewrite rules for clean URLs
    location /pages/ {
        try_files $uri $uri/ /pages/index.php?$query_string;
    }

    # Default page redirect
    location = / {
        rewrite ^ /pages/index.php last;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self' https://*.mollie.com; frame-ancestors 'self'; object-src 'none'; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://js.mollie.com; script-src-elem 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://js.mollie.com; connect-src 'self' https://www.google-analytics.com https://api.mollie.com https://js.mollie.com; frame-src 'self' https://*.mollie.com https://www.google.com https://maps.googleapis.com; worker-src 'self' blob:; manifest-src 'self'" always;

    # Service Worker - Never cache (must always be fresh)
    location = /frontend/public/sw.js {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
    
    # Static files caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|webp|avif|woff|woff2|ttf|eot|json)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Deny access to .env and other sensitive files
    location ~ /\. {
        deny all;
    }

    location ~ \.env$ {
        deny all;
    }

    # Hide nginx version
    server_tokens off;

    # Logging
    access_log /var/log/nginx/nijenhuis_access.log;
    error_log /var/log/nginx/nijenhuis_error.log;
}
