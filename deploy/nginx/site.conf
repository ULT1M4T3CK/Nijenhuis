# HTTP server - redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name nijenhuis-botenverhuur.com www.nijenhuis-botenverhuur.com;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nijenhuis-botenverhuur.com www.nijenhuis-botenverhuur.com;

    # SSL Certificate paths (update with your certificate paths)
    # For Let's Encrypt: /etc/letsencrypt/live/nijenhuis-botenverhuur.com/
    ssl_certificate /etc/letsencrypt/live/nijenhuis-botenverhuur.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nijenhuis-botenverhuur.com/privkey.pem;

    # SSL Configuration - Modern, secure settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/nijenhuis-botenverhuur.com/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # GZip Compression - Enable compression for text-based content
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml application/xhtml+xml application/x-font-ttf application/vnd.ms-fontobject font/opentype image/svg+xml image/x-icon text/html;
    gzip_min_length 1000;
    gzip_disable "msie6";
    
    # Brotli Compression - Better compression than GZip (if nginx-module-brotli is installed)
    # Uncomment if Brotli module is available:
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml application/xhtml+xml application/x-font-ttf application/vnd.ms-fontobject font/opentype image/svg+xml image/x-icon text/html;
    # brotli_min_length 1000;

    # Serve built frontend
    root /var/www/nijenhuis/frontend/dist;
    index index.html;

    # Never serve raw JSON from the document root (operational data is under data/, read via PHP only)
    location ~* \.json$ {
        deny all;
        return 403;
    }

    # AI crawler content: llms.txt (index for AI systems)
    location = /llms.txt {
        alias /var/www/nijenhuis/llms.txt;
        add_header Content-Type "text/plain; charset=utf-8" always;
        add_header Cache-Control "public, max-age=86400" always;
        add_header X-Robots-Tag "all" always;
    }

    # AI crawler content: llms-full.txt (full site content)
    location = /llms-full.txt {
        fastcgi_pass unix:/var/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/nijenhuis/pages/llms-full.php;
        include fastcgi_params;
        add_header Cache-Control "public, max-age=86400" always;
    }

    # AI crawler content: per-page markdown files (e.g. /giethoorn.md)
    location ~ ^/([a-z0-9][a-z0-9\-]*)\.md$ {
        fastcgi_pass unix:/var/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/nijenhuis/pages/serve-markdown.php;
        fastcgi_param QUERY_STRING page=$1;
        include fastcgi_params;
        add_header Cache-Control "public, max-age=86400" always;
    }

    # Block direct access to markdown source directory
    location ^~ /markdown/ {
        deny all;
        return 404;
    }

    # Blog / CMS uploads live under frontend/Images (not inside Vite outDir). Without this,
    # requests like /frontend/Images/blog/*.jpg 404 when root is frontend/dist.
    location ^~ /frontend/Images/ {
        alias /var/www/nijenhuis/frontend/Images/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public" always;
    }

    # API proxy with enhanced security headers
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Security headers for proxy
        proxy_set_header Connection "";
        proxy_redirect off;
        proxy_buffering off;
    }

    # Security headers - Comprehensive set
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://kit.fontawesome.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://ka-f.fontawesome.com; img-src 'self' data: https:; connect-src 'self' https://api.mollie.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;
    
    # Additional security headers
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Expect-CT "max-age=86400, enforce" always;

    # Block access to sensitive files (.env, backups, etc.)
    location ~ /\.env {
        deny all;
        return 404;
    }
    
    location ~ \.(env|bak|backup|old|tmp|swp|~)$ {
        deny all;
        return 404;
    }
    
    # Block access to .git directory
    location ~ /\.git {
        deny all;
        return 404;
    }

    # Serve webhook handlers from backend folder (PHP/py endpoints handled upstream)
    location /webhooks/mollie/ {
        alias /var/www/nijenhuis/backend/webhooks/mollie/;
        autoindex off;
        
        # Security headers for webhooks
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
    }

    # Service Worker - Never cache (must always be fresh)
    location ~* sw\.js$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    
    # Static files caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security: Hide nginx version
    server_tokens off;
    
    # Logging
    access_log /var/log/nginx/nijenhuis_access.log;
    error_log /var/log/nginx/nijenhuis_error.log;
}

